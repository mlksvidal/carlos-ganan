# Netlify configuration — carlos-ganan
# Plugin @netlify/plugin-nextjs se auto-instala para Next.js apps detectadas.

[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "22"
  PNPM_VERSION = "9"

# Security headers (mismos que tenía vercel.json)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://wa.me https://api.whatsapp.com https://maps.googleapis.com https://maps.gstatic.com; frame-src https://maps.google.com https://www.google.com https://maps.googleapis.com https://www.instagram.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://wa.me; upgrade-insecure-requests"

# Cache largo para assets estáticos de Next
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache 1 semana para imágenes de /public
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
